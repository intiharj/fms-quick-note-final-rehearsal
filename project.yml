name: QuickNoteFinalRehearsal

options:
  bundleIdPrefix: dev.foxmountain
  deploymentTarget:
    iOS: 17.0
  xcodeVersion: "16.0"

packages:
  FoxMountainKit:
    path: ../../fms/shared/FoxMountainKit

targets:
  QuickNoteFinalRehearsal:
    type: application
    platform: iOS
    sources:
      - path: Sources/QuickNoteFinalRehearsal
      - path: Sources/Views
      - path: Resources
    dependencies:
      - package: FoxMountainKit
    settings:
      base:
        PRODUCT_NAME: QuickNoteFinalRehearsal
        PRODUCT_BUNDLE_IDENTIFIER: dev.foxmountain.quicknotefinalrehearsal
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
    info:
      path: Sources/QuickNoteFinalRehearsal/Info.plist

  QuickNoteFinalRehearsalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: QuickNoteFinalRehearsal

schemes:
  QuickNoteFinalRehearsal:
    build:
      targets:
        QuickNoteFinalRehearsal: all
    testTargets:
      - QuickNoteFinalRehearsalTests
