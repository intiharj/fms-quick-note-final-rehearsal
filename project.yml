name: QuickNoteFinalRehearsal

options:
  bundleIdPrefix: dev.foxmountain
  deploymentTarget:
    iOS: 17.0
  xcodeVersion: "16.0"

packages:
  FoxMountainKitCore:
    url: https://github.com/intiharj/FoxMountainKitCore.git
    branch: main

targets:
  QuickNoteFinalRehearsal:
    type: application
    platform: iOS
    sources:
      - path: Sources/QuickNoteFinalRehearsal
      - path: Sources/Views
      - path: Resources
    dependencies:
      - package: FoxMountainKitCore
    settings:
      base:
        PRODUCT_NAME: QuickNoteFinalRehearsal
        PRODUCT_BUNDLE_IDENTIFIER: dev.foxmountain.quicknotefinalrehearsal
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: 5FM8KU55B9
        CODE_SIGN_STYLE: Automatic
      configs:
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: match AppStore dev.foxmountain.quicknotefinalrehearsal
    info:
      path: Sources/QuickNoteFinalRehearsal/Info.plist

  QuickNoteFinalRehearsalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: QuickNoteFinalRehearsal

schemes:
  QuickNoteFinalRehearsal:
    build:
      targets:
        QuickNoteFinalRehearsal: all
    testTargets:
      - QuickNoteFinalRehearsalTests
