name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      CERTIFICATES_GITHUB_TOKEN: ${{ secrets.CERTIFICATES_GITHUB_TOKEN }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_KEY"
          test -n "$CERTIFICATES_GITHUB_TOKEN"
          test -n "$BUILD_CERTIFICATE_BASE64"
          test -n "$BUILD_PROVISION_PROFILE_BASE64"
          test -n "$KEYCHAIN_PASSWORD"

      - name: Configure git auth for private GitHub dependencies
        run: |
          git config --global url."https://x-access-token:${CERTIFICATES_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install tooling
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Show tool versions
        run: |
          xcodebuild -version
          xcodegen --version
          fastlane --version

      - name: Inspect release contract
        run: |
          test -f fms-release.json
          cat fms-release.json

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing assets manually
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PP_PATH="$RUNNER_TEMP/quicknote.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$BUILD_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" /Library/Keychains/System.keychain /Library/Keychains/SystemRootCertificates.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          echo "== identities in temp keychain =="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo "== active keychains =="
          security list-keychains -d user || true
          echo "== profiles =="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Archive app directly with xcodebuild
        env:
          APP_BUNDLE_ID: dev.foxmountain.quicknotefinalrehearsal
          APP_PROFILE_NAME: match AppStore dev.foxmountain.quicknotefinalrehearsal
        run: |
          mkdir -p build/logs build/archive
          xcodebuild \
            -project QuickNoteFinalRehearsal.xcodeproj \
            -scheme QuickNoteFinalRehearsal \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/archive/QuickNoteFinalRehearsal.xcarchive" \
            -derivedDataPath "$PWD/build/DerivedData" \
            -resultBundlePath "$PWD/build/archive/QuickNoteFinalRehearsal.xcresult" \
            -showBuildTimingSummary \
            DEVELOPMENT_TEAM=5FM8KU55B9 \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='Apple Distribution' \
            PROVISIONING_PROFILE_SPECIFIER="$APP_PROFILE_NAME" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive | tee "$PWD/build/logs/xcodebuild-archive.log"

      - name: Inspect archive outputs
        if: always()
        run: |
          pwd
          ls -la
          find build -maxdepth 4 -type d | sort || true
          find build -maxdepth 4 -type f | sort || true
          echo "== process snapshot =="
          ps aux | grep -E 'codesign|xcodebuild|fastlane|ruby|security' | grep -v grep || true
          echo "== keychain snapshot =="
          security list-keychains -d user || true
          security default-keychain -d user || true
          security find-identity -v -p codesigning || true

      - name: Export ipa from archive
        run: fastlane export_only

      - name: Deploy TestFlight
        run: fastlane beta
