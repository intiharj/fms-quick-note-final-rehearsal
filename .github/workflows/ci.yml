name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    env:
      CERTIFICATES_GITHUB_TOKEN: ${{ secrets.CERTIFICATES_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$CERTIFICATES_GITHUB_TOKEN"

      - name: Configure git auth for private package fetches
        run: |
          git config --global url."https://x-access-token:${CERTIFICATES_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project QuickNoteFinalRehearsal.xcodeproj \
            -scheme QuickNoteFinalRehearsal \
            -destination 'generic/platform=iOS Simulator'
